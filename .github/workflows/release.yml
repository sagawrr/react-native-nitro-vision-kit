name: Release

# Publish to npm automatically when a version tag (`vX.Y.Z`) is pushed.
# Tags are created by `bun release` (release-it). This workflow holds the only
# path to the npm registry: npm Trusted Publishing (OIDC), which mints a
# short-lived, workflow-scoped publish token — no long-lived NPM_TOKEN secret.
# Provenance attestations are generated automatically (public repo + OIDC),
# cryptographically binding every published tarball to this exact workflow run.
on:
  push:
    tags:
      - 'v*'

# id-token: write lets GitHub issue the OIDC token npm exchanges for a publish
# token. contents: read is the least privilege needed to checkout the tag.
# No other permissions are granted.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    # Recommended: create a `release` environment in repo settings with required
    # reviewers + tag-protection rules on `v*` so only maintainers can trigger.
    environment: release
    # Job-level permissions are REQUIRED for OIDC: GitHub only grants id-token:write
    # to the job when it's declared at job scope (top-level alone can be dropped
    # by account/org default-permission handling). Keep it explicit and narrow.
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Match the tag exactly; no ref resolution drift.
          ref: ${{ github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Setup Node (npm CLI w/ OIDC)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.14'
          # registry-url is REQUIRED for npm trusted publishing: it scopes the
          # publish to npmjs.org so the CLI knows where to perform the OIDC
          # exchange. Do NOT set NODE_AUTH_TOKEN (no secret) — npm v11.5.1+
          # auto-detects the OIDC environment and mints its own token.
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Install dependencies
        # Non-frozen on purpose — see ci.yml. The published package is source +
        # generated lib/nitrogen only; install-time resolution never reaches
        # the tarball, so integrity rests on OIDC + provenance + no cache.
        run: bun install

      - name: Build
        run: bun run build

      - name: Verify Nitrogen specs are up to date
        # Fails the release if the committed generated files don't match the spec.
        run: |
          bun run specs
          git diff --exit-code -- nitrogen/generated || \
            (echo "::error::nitrogen/generated is stale — run 'bun run specs' and commit before releasing." && exit 1)

      - name: Publish (OIDC, no token)
        # --provenance forces OIDC: npm exchanges the GitHub OIDC token for a
        # short-lived publish token. No NODE_AUTH_TOKEN / NPM_TOKEN secret.
        run: npm publish --access public --provenance
