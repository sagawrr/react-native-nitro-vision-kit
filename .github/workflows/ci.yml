name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Typecheck, Build, Specs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # Pinned to immutable commit SHA to prevent action-tag retagging attacks.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies (frozen lockfile)
        # --frozen-lockfile refuses to mutate the lockfile, so a compromised or
        # altered dependency set cannot slip in during CI.
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint-ci

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Generate Nitrogen specs
        run: bun run specs
